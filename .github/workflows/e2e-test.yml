name: Run E2E Test with Puppeteer and Chrome

on:
  push:
    branches:
      - e2e-testing-patch-1
      - dev
  pull_request:
    branches:
      - e2e-testing-patch-1
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Puppeteer E2E Test
        run: node src/e2e-test.js

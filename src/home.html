<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completed Problems</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 420px;
    height: 540px;
    font-family: Arial, sans-serif;
  }

  .container {
    margin-top: 20px;
    width: 100%;
    max-width: 400px;
  }

  .problem-button {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
  }

  .problem-button.easy {
    background-color: #d4edda;
  }

  .problem-button.medium {
    background-color: #ffeeba;
  }

  .problem-button.hard {
    background-color: #f8d7da;
  }

  .problem-number {
    font-weight: bold;
  }

  .problem-title {
    flex-grow: 1;
    margin: 0 10px;
  }

  .difficulty {
    font-style: italic;
  }

  input[type="text"], button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    max-width: 400px;
    font-size: 16px;
  }
</style>
<body>
  <h1>Completed Problems</h1>
  <input id="usernameInput" type="text" placeholder="Enter LeetCode username">
  <button id="fetchButton">Fetch Completed Problems</button>
  <div class="container"></div>
  <script src="fetch_problems.js"></script>
</body>
</html>
